<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>agent-ask-anywhere — options</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header>
      <img src="/icon/48.png" alt="" width="32" height="32" />
      <h1>agent-ask-anywhere</h1>
      <span class="version">v1.0.0</span>
      <span id="server-status" class="server-status">·</span>
    </header>
    <main>
      <aside>
        <input id="filter" type="search" placeholder="Filter skills…" />
        <ul id="skill-list" class="skill-list"></ul>
        <div class="actions">
          <label class="btn">
            <input id="import-input" type="file" accept=".skill,.zip" hidden />
            Import .skill
          </label>
        </div>
      </aside>
      <section id="detail" class="detail">
        <p class="empty">Select a skill on the left to view details.</p>
      </section>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
